<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page debug">
    <video src="assets/video/coder.mp4" autoplay muted loop></video>

    <!-- Header -->
    <header class="reel-header">
      <div class="nav-icon">
        <i class="bi bi-play-btn"></i>
      </div>
      <nav class="nav-link">
        <span>Esplora</span>
        <span>Seguiti</span>
        <span>Per te</span>
      </nav>
      <div class="nav-icon">
        <i class="bi bi-search"></i>
      </div>
    </header>

    <!-- Sidebar -->
    <div class="sidebar">
      <div>
        <img class="img-sidebar" src="./assets/img/boolean_logo.png">
      </div>
      <div class="text-sidebar">
        <i class="icon bi bi-bookmark-fill"></i>
        <p class="text">580</p>
      </div>
      <div>
        <i class="icon bi bi-heart-fill"></i>
        <p class="text">13</p>
      </div>
      <div>
        <i class="icon bi bi-chat-dots-fill"></i>
        <p class="text">491</p>
      </div>
      <div>
        <i class="icon bi bi-share-fill"></i>
        <p class="text"> 638 </p>
      </div>
    </div>


    <!-- Footer -->
    <footer>
      <div class="footer-description">
        <p>
          boolean.careers
        </p>
        <span>
          prova il fundamental camp. 20 ore di corso<br>
          gratuito per...<strong>Vedi altro</strong>
        </span>
      </div>
      <div class="footer-icon">
        <div>
          <i class="icon bi bi-house-fill"></i>
          <p class="text">Home</p>
        </div>
        <div>
          <i class="icon bi bi-people"></i>
          <p class="text">Amici</p>
        </div>
        <div>
          <i class="icon bi bi-plus-square-fill"></i>
        </div>
        <div>
          <i class="icon bi bi-chat-square"></i>
          <p class="text">posta in arrivo</p>
        </div>
        <div>
          <i class="icon bi bi-person"></i>
          <p class="text">profilo</p>
        </div>

      </div>

    </footer>
  </div>





</body>

</html>
